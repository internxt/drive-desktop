name: Check PR size

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check_pr_size:
    # Ignore PRs with name merge-X-X-X-release
    if: |
      !(startsWith(github.head_ref, 'merge-') && endsWith(github.head_ref, '-release') && github.base_ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate changed lines
        id: diff_check
        run: |
          # Get the target branch commit (base) and the PR branch commit (head)
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          # Compute the merge base between the two branches
          MERGE_BASE=$(git merge-base "$HEAD_SHA" "$BASE_SHA")
          echo "Merge Base: $MERGE_BASE"

          # Calculate added and deleted lines between the merge base and the head commit
          TOTAL_CHANGED=$(git diff --numstat "$MERGE_BASE" "$HEAD_SHA" \
            | grep -Ev "(package-lock.json|schema.ts|preload.js)" \
            | awk '{ added += $1; deleted += $2 } END { print added + deleted }')

          # Default to 0 if nothing is output
          TOTAL_CHANGED=${TOTAL_CHANGED:-0}
          echo "Total changed lines: $TOTAL_CHANGED"

          # Make the total available for later steps
          echo "total=$TOTAL_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Comment if PR is large
        if: ${{ steps.diff_check.outputs.total > 500 }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-size-warning -->';
            const total = '${{ steps.diff_check.outputs.total }}';
            const body = [
              marker,
              `This PR changes ${total} lines.`,
              '',
              'If it contains multiple concerns, consider splitting it. Large PRs are fine when the changes are mechanical, intentionally grouped, or belong together as part of the same feature.',
              '',
              'Please make sure the PR description gives reviewers enough context about what matters most to review.',
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existingComment = comments.find((comment) => comment.body?.includes(marker));

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Could not post PR size comment: ${error.message}`);
            }
